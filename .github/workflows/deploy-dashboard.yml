name: Deploy Dashboard

on:
  workflow_dispatch:

jobs:
  deploy_dashboard:
    name: Deploy Production Dashboard To Vercel
    runs-on: ubuntu-latest
    environment:
      name: Production
    concurrency:
      group: production-dashboard
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pierre_dashboard/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Install dependencies
        working-directory: ./pierre_dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: ./pierre_dashboard
        env:
          VITE_API_URL: ${{ vars.API_URL || 'https://pierreclubs-backend-prod.fly.dev' }}
          VITE_APP_ENV: ${{ vars.APP_ENV || 'production' }}
          VITE_POSTHOG_KEY: ${{ vars.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST || 'https://eu.i.posthog.com' }}
        run: npm run build

      - name: Deploy to Vercel
        working-directory: ./pierre_dashboard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_PT50uRjbghMd8DEOFcz76KH4
          VERCEL_PROJECT_ID: prj_GAqsmPZJy1vUVRmbZROfU7Sieo2K
        run: vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"

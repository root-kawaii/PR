name: Deploy Backend & Build App

on:
  workflow_dispatch:  # Manual trigger via GitHub UI
    inputs:
      run_migrations:
        description: 'Run database migrations'
        required: false
        type: boolean
        default: true
      deploy_backend:
        description: 'Deploy backend to Fly.io'
        required: false
        type: boolean
        default: true
      build_app:
        description: 'Trigger EAS development build'
        required: false
        type: boolean
        default: true

jobs:
  migrations:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.run_migrations == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for pending migrations
        id: check_migrations
        run: |
          cd DB/migrations

          # Build connection string
          DB_URL="postgresql://postgres:${{ secrets.SUPABASE_DB_PASSWORD }}@${{ secrets.SUPABASE_HOST }}:5432/postgres?sslmode=require"

          # Get list of migration files
          MIGRATION_FILES=$(ls -1 *.sql | sort)

          # Get already applied migrations from database using Docker
          APPLIED_MIGRATIONS=$(echo "SELECT migration_name FROM schema_migrations ORDER BY migration_name;" | docker run --rm -i postgres:15 psql "$DB_URL" -t 2>/dev/null || echo "")

          # Find pending migrations
          PENDING_MIGRATIONS=""
          for migration in $MIGRATION_FILES; do
            if ! echo "$APPLIED_MIGRATIONS" | grep -q "$migration"; then
              PENDING_MIGRATIONS="$PENDING_MIGRATIONS $migration"
            fi
          done

          if [ -z "$PENDING_MIGRATIONS" ]; then
            echo "No pending migrations found"
            echo "has_pending=false" >> $GITHUB_OUTPUT
          else
            echo "Pending migrations: $PENDING_MIGRATIONS"
            echo "has_pending=true" >> $GITHUB_OUTPUT
            echo "pending_list=$PENDING_MIGRATIONS" >> $GITHUB_OUTPUT
          fi

      - name: Run pending migrations
        if: steps.check_migrations.outputs.has_pending == 'true'
        run: |
          cd DB/migrations

          # Build connection string
          DB_URL="postgresql://postgres:${{ secrets.SUPABASE_DB_PASSWORD }}@${{ secrets.SUPABASE_HOST }}:5432/postgres?sslmode=require"

          # Create schema_migrations table if it doesn't exist
          echo "📋 Creating schema_migrations table..."
          echo "CREATE TABLE IF NOT EXISTS schema_migrations (
            id SERIAL PRIMARY KEY,
            migration_name VARCHAR(255) UNIQUE NOT NULL,
            applied_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );" | docker run --rm -i postgres:15 psql "$DB_URL"

          # Run each pending migration
          for migration in ${{ steps.check_migrations.outputs.pending_list }}; do
            echo "▶️  Running migration: $migration"

            if cat "$migration" | docker run --rm -i postgres:15 psql "$DB_URL" > /dev/null 2>&1; then
              # Record migration as applied
              echo "INSERT INTO schema_migrations (migration_name) VALUES ('$migration');" | docker run --rm -i postgres:15 psql "$DB_URL" > /dev/null 2>&1
              echo "✅ Migration $migration completed"
            else
              echo "❌ Migration $migration failed"
              exit 1
            fi
          done

          echo "All migrations completed successfully"

  deploy_backend:
    name: Deploy Backend to Fly.io
    runs-on: ubuntu-latest
    needs: migrations
    if: |
      github.event.inputs.deploy_backend == 'true' &&
      (needs.migrations.result == 'success' || needs.migrations.result == 'skipped' || needs.migrations.result == 'failure')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        working-directory: ./rust_BE
        run: flyctl deploy --remote-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployment
        run: |
          echo "Waiting for deployment to be ready..."
          sleep 10

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://pierre-two-backend.fly.dev/health || echo "000")

          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "404" ]; then
            echo "✓ Backend is responding (HTTP $RESPONSE)"
          else
            echo "⚠ Backend might not be ready yet (HTTP $RESPONSE)"
            exit 1
          fi

  build_app:
    name: Build App with EAS
    runs-on: ubuntu-latest
    needs: deploy_backend
    if: |
      always() &&
      (needs.deploy_backend.result == 'success' || needs.deploy_backend.result == 'skipped') &&
      github.event.inputs.build_app == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pierre_two/package-lock.json

      - name: Install dependencies
        working-directory: ./pierre_two
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Switch to production endpoint
        working-directory: ./pierre_two
        run: |
          echo "Switching API endpoint to production..."
          node -e "
            const fs = require('fs');
            const appJson = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            appJson.expo.extra.apiUrl = 'https://pierre-two-backend.fly.dev';
            fs.writeFileSync('app.json', JSON.stringify(appJson, null, 2) + '\n');
          "

          echo "✓ API endpoint set to production"
          grep -A 2 '"extra"' app.json

      - name: Trigger EAS development build
        working-directory: ./pierre_two
        run: |
          echo "Starting EAS preview build for Android..."
          eas build --platform android --profile preview --non-interactive --no-wait

      - name: Revert to localhost endpoint
        if: always()
        working-directory: ./pierre_two
        run: |
          echo "Reverting API endpoint to localhost..."
          node -e "
            const fs = require('fs');
            const appJson = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            appJson.expo.extra.apiUrl = 'http://172.20.10.5:3000';
            fs.writeFileSync('app.json', JSON.stringify(appJson, null, 2) + '\n');
          "

          echo "✓ API endpoint reverted to localhost"

      - name: Commit endpoint revert
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          if ! git diff --quiet pierre_two/app.json; then
            git add pierre_two/app.json
            git commit -m "Revert API endpoint to localhost [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [migrations, deploy_backend, build_app]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "# Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Jobs Status" >> $GITHUB_STEP_SUMMARY
          echo "- Migrations: ${{ needs.migrations.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend Deploy: ${{ needs.deploy_backend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- App Build: ${{ needs.build_app.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.migrations.result }}" = "success" ]; then
            echo "✅ Database migrations completed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.deploy_backend.result }}" = "success" ]; then
            echo "✅ Backend deployed to https://pierre-two-backend.fly.dev" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.build_app.result }}" = "success" ]; then
            echo "✅ EAS development build triggered" >> $GITHUB_STEP_SUMMARY
            echo "Check build status at: https://expo.dev" >> $GITHUB_STEP_SUMMARY
          fi

name: Deploy Backend & Build App

on:
  # Auto-deploy when a version tag is pushed (e.g. git tag v1.0.0 && git push --tags)
  push:
    tags:
      - "v*"

  # Manual trigger with full control
  workflow_dispatch:
    inputs:
      run_migrations:
        description: "Run database migrations"
        required: false
        type: boolean
        default: true
      deploy_backend:
        description: "Deploy backend to Fly.io"
        required: false
        type: boolean
        default: true
      deploy_dashboard:
        description: "Deploy dashboard to Netlify"
        required: false
        type: boolean
        default: true
      build_app:
        description: "Trigger EAS development build"
        required: false
        type: boolean
        default: false

jobs:
  migrations:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    # Run on tag push (always) or manual trigger (if toggled on)
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      github.event.inputs.run_migrations == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Check for pending migrations
        id: check_migrations
        env:
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          PGHOST: ${{ secrets.PGHOST }}
          PGUSER: ${{ secrets.PGUSER }}
          PGDATABASE: postgres
          PGSSLMODE: require
          PGPORT: 5432
        run: |
          cd DB/migrations

          echo "Connecting to Supabase..."

          # Get list of migration files
          MIGRATION_FILES=$(ls -1 *.sql 2>/dev/null | sort || echo "")

          if [ -z "$MIGRATION_FILES" ]; then
            echo "No migration files found"
            echo "has_pending=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get already applied migrations
          APPLIED_MIGRATIONS=$(psql -t -c "SELECT migration_name FROM schema_migrations ORDER BY migration_name;" 2>/dev/null || echo "")

          # Find pending migrations
          PENDING_MIGRATIONS=""
          for migration in $MIGRATION_FILES; do
            if ! echo "$APPLIED_MIGRATIONS" | grep -q "$migration"; then
              PENDING_MIGRATIONS="$PENDING_MIGRATIONS $migration"
            fi
          done

          if [ -z "$PENDING_MIGRATIONS" ]; then
            echo "No pending migrations found"
            echo "has_pending=false" >> $GITHUB_OUTPUT
          else
            echo "Pending migrations:$PENDING_MIGRATIONS"
            echo "has_pending=true" >> $GITHUB_OUTPUT
            echo "pending_list=$PENDING_MIGRATIONS" >> $GITHUB_OUTPUT
          fi

      - name: Run pending migrations
        if: steps.check_migrations.outputs.has_pending == 'true'
        env:
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          PGHOST: ${{ secrets.PGHOST }}
          PGUSER: ${{ secrets.PGUSER }}
          PGDATABASE: postgres
          PGSSLMODE: require
          PGPORT: 5432
        run: |
          cd DB/migrations

          # Create schema_migrations table if it doesn't exist
          echo "Creating schema_migrations table..."
          psql -c "CREATE TABLE IF NOT EXISTS schema_migrations (
            id SERIAL PRIMARY KEY,
            migration_name VARCHAR(255) UNIQUE NOT NULL,
            applied_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );"

          # Run each pending migration
          for migration in ${{ steps.check_migrations.outputs.pending_list }}; do
            echo "Running migration: $migration"

            if psql -f "$migration"; then
              psql -c "INSERT INTO schema_migrations (migration_name) VALUES ('$migration');"
              echo "Migration $migration completed"
            else
              echo "Migration $migration failed"
              exit 1
            fi
          done

          echo "All migrations completed successfully"

  deploy_backend:
    name: Deploy Backend to Fly.io
    runs-on: ubuntu-latest
    needs: migrations
    # Run on tag push (always) or manual trigger (if toggled on)
    # Proceeds even if migrations were skipped (no pending)
    if: >-
      always() &&
      (needs.migrations.result == 'success' || needs.migrations.result == 'skipped') &&
      (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.deploy_backend == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        working-directory: ./rust_BE
        run: flyctl deploy --remote-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployment
        run: |
          echo "Waiting for deployment to be ready..."
          sleep 10

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://pierre-two-backend.fly.dev/health || echo "000")

          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "404" ]; then
            echo "Backend is responding (HTTP $RESPONSE)"
          else
            echo "Backend might not be ready yet (HTTP $RESPONSE)"
            exit 1
          fi

  deploy_dashboard:
    name: Deploy Dashboard to Netlify
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.ref, 'refs/tags/v') || github.event.inputs.deploy_dashboard == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: pierre_dashboard/package-lock.json

      - name: Install dependencies
        working-directory: ./pierre_dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: ./pierre_dashboard
        env:
          VITE_API_URL: https://pierre-two-backend.fly.dev
        run: npm run build

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./pierre_dashboard/dist
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  build_app:
    name: Build App with EAS
    runs-on: ubuntu-latest
    needs: deploy_backend
    # Only runs on manual trigger with build_app toggled on — never on tag push
    if: >-
      always() &&
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.build_app == 'true' &&
      (needs.deploy_backend.result == 'success' || needs.deploy_backend.result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pierre_two/package-lock.json

      - name: Install dependencies
        working-directory: ./pierre_two
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Trigger EAS preview build
        working-directory: ./pierre_two
        env:
          APP_ENV: production
          EXPO_PUBLIC_API_URL: https://pierre-two-backend.fly.dev
        run: |
          echo "Starting EAS preview build for Android..."
          eas build --platform android --profile preview --non-interactive --no-wait

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [migrations, deploy_backend, deploy_dashboard, build_app]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "# Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "**Triggered by tag:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Triggered manually**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Jobs Status" >> $GITHUB_STEP_SUMMARY
          echo "- Migrations: ${{ needs.migrations.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend Deploy: ${{ needs.deploy_backend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dashboard Deploy: ${{ needs.deploy_dashboard.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- App Build: ${{ needs.build_app.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.migrations.result }}" = "success" ]; then
            echo "Database migrations completed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.deploy_backend.result }}" = "success" ]; then
            echo "Backend deployed to https://pierre-two-backend.fly.dev" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.build_app.result }}" = "success" ]; then
            echo "EAS development build triggered" >> $GITHUB_STEP_SUMMARY
            echo "Check build status at: https://expo.dev" >> $GITHUB_STEP_SUMMARY
          fi

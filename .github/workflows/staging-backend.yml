name: Staging Backend Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_migrations:
        description: "Run database migrations"
        required: false
        type: boolean
        default: true
      deploy_backend:
        description: "Deploy backend to Fly.io"
        required: false
        type: boolean
        default: true

jobs:
  migrations:
    name: Run Staging Database Migrations
    runs-on: ubuntu-latest
    environment:
      name: Staging
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.run_migrations == 'true'
    concurrency:
      group: staging-migrations
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Check for pending migrations
        id: check_migrations
        env:
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          PGHOST: ${{ secrets.PGHOST }}
          PGUSER: ${{ secrets.PGUSER }}
          PGDATABASE: ${{ secrets.PGDATABASE || 'postgres' }}
          PGSSLMODE: ${{ secrets.PGSSLMODE || 'require' }}
          PGPORT: 5432
        run: |
          cd DB/migrations

          echo "Connecting to Supabase staging..."

          MIGRATION_FILES=$(ls -1 *.sql 2>/dev/null | sort || echo "")

          if [ -z "$MIGRATION_FILES" ]; then
            echo "No migration files found"
            echo "has_pending=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          APPLIED_MIGRATIONS=$(psql -t -c "SELECT migration_name FROM schema_migrations ORDER BY migration_name;" 2>/dev/null || echo "")

          PENDING_MIGRATIONS=""
          for migration in $MIGRATION_FILES; do
            if ! echo "$APPLIED_MIGRATIONS" | grep -q "$migration"; then
              PENDING_MIGRATIONS="$PENDING_MIGRATIONS $migration"
            fi
          done

          if [ -z "$PENDING_MIGRATIONS" ]; then
            echo "No pending migrations found"
            echo "has_pending=false" >> $GITHUB_OUTPUT
          else
            echo "Pending migrations:$PENDING_MIGRATIONS"
            echo "has_pending=true" >> $GITHUB_OUTPUT
            echo "pending_list=$PENDING_MIGRATIONS" >> $GITHUB_OUTPUT
          fi

      - name: Run pending migrations
        if: steps.check_migrations.outputs.has_pending == 'true'
        env:
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          PGHOST: ${{ secrets.PGHOST }}
          PGUSER: ${{ secrets.PGUSER }}
          PGDATABASE: ${{ secrets.PGDATABASE || 'postgres' }}
          PGSSLMODE: ${{ secrets.PGSSLMODE || 'require' }}
          PGPORT: 5432
        run: |
          cd DB/migrations

          psql -c "CREATE TABLE IF NOT EXISTS schema_migrations (
            id SERIAL PRIMARY KEY,
            migration_name VARCHAR(255) UNIQUE NOT NULL,
            applied_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );"

          for migration in ${{ steps.check_migrations.outputs.pending_list }}; do
            echo "▶️  Running migration: $migration"

            if psql -f "$migration"; then
              psql -c "INSERT INTO schema_migrations (migration_name) VALUES ('$migration');"
              echo "Migration $migration completed"
            else
              echo "Migration $migration failed"
              exit 1
            fi
          done

          echo "All migrations completed successfully"

  deploy_backend:
    name: Deploy Staging Backend to Fly.io
    runs-on: ubuntu-latest
    needs: migrations
    environment:
      name: Staging
      url: ${{ vars.API_URL || 'https://pierreclubs-backend-staging.fly.dev' }}
    if: >-
      always() &&
      (needs.migrations.result == 'success' || needs.migrations.result == 'skipped') &&
      (github.event_name == 'push' || github.event.inputs.deploy_backend == 'true')
    concurrency:
      group: staging-backend
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        working-directory: ./rust_BE
        run: flyctl deploy --config fly.staging.toml --remote-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployment
        env:
          API_URL: ${{ vars.API_URL || 'https://pierreclubs-backend-staging.fly.dev' }}
        run: |
          echo "Waiting for deployment to be ready..."
          sleep 10

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health" || echo "000")

          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "404" ]; then
            echo "Backend is responding (HTTP $RESPONSE)"
          else
            echo "Backend might not be ready yet (HTTP $RESPONSE)"
            exit 1
          fi

  summary:
    name: Staging Deployment Summary
    runs-on: ubuntu-latest
    needs: [migrations, deploy_backend]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "# Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "**Triggered by push to main:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Triggered manually**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Jobs Status" >> $GITHUB_STEP_SUMMARY
          echo "- Migrations: ${{ needs.migrations.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend Deploy: ${{ needs.deploy_backend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.migrations.result }}" = "success" ]; then
            echo "Database migrations applied to staging" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.deploy_backend.result }}" = "success" ]; then
            echo "Backend deployed to ${{ vars.API_URL || 'https://pierreclubs-backend-staging.fly.dev' }}" >> $GITHUB_STEP_SUMMARY
          fi
